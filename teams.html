<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams | WC Football 2026</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html"><span class="trophy">🏆</span> WC Football 2026</a>
  <ul class="nav-links">
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="groups.html">📊 Groups</a></li>
    <li><a href="schedule.html">📅 Schedule <span class="live-badge">LIVE</span></a></li>
    <li><a href="teams.html" class="active">🌍 Teams</a></li>
    <li><a href="argentina.html">🇦🇷 Argentina</a></li>
    <li><a href="facts.html">⭐ Facts</a></li>
  </ul>
</nav>

<div class="page-hero">
  <div class="container">
    <h1>🌍 Teams at WC 2026</h1>
    <p>48 nations competing across 12 groups · Click a team for squad and info</p>
  </div>
</div>

<div class="container">

  <!-- SEARCH -->
  <div class="card" style="padding:.75rem 1.25rem;margin-bottom:.5rem;">
    <input type="text" id="team-search" placeholder="🔍 Search team or confederation…"
      style="width:100%;background:var(--bg-dark);border:1px solid var(--border);border-radius:6px;padding:.6rem 1rem;color:var(--text-main);font-size:.9rem;outline:none;">
  </div>

  <!-- CONFEDERATION FILTER -->
  <div class="tabs" id="conf-tabs">
    <button class="tab-btn active" onclick="filterConf('ALL',this)">🌐 All</button>
    <button class="tab-btn" onclick="filterConf('UEFA',this)">🇪🇺 UEFA</button>
    <button class="tab-btn" onclick="filterConf('CONMEBOL',this)">🌎 CONMEBOL</button>
    <button class="tab-btn" onclick="filterConf('CONCACAF',this)">🌍 CONCACAF</button>
    <button class="tab-btn" onclick="filterConf('CAF',this)">🌍 CAF</button>
    <button class="tab-btn" onclick="filterConf('AFC',this)">🌏 AFC</button>
    <button class="tab-btn" onclick="filterConf('OFC',this)">🌊 OFC</button>
  </div>

  <!-- ALL TEAMS GRID -->
  <div id="teams-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;margin-bottom:2rem;"></div>

  <!-- TEAM DETAIL PANEL -->
  <div id="team-detail" style="display:none;"></div>

</div>

<footer>
  <strong>World Cup Football 2026</strong> — Fan Portal &nbsp;|&nbsp;
  <a href="https://www.fifa.com" target="_blank" style="color:var(--gold);">Official FIFA Site</a>
</footer>

<script src="js/data.js"></script>
<script>
// Build full team list from groups
const allTeams = [];
const confMap = {
  ARG:"CONMEBOL",BRA:"CONMEBOL",URU:"CONMEBOL",COL:"CONMEBOL",ECU:"CONMEBOL",PAR:"CONMEBOL",
  ESP:"UEFA",FRA:"UEFA",ENG:"UEFA",GER:"UEFA",POR:"UEFA",NED:"UEFA",BEL:"UEFA",SUI:"UEFA",
  SWE:"UEFA",NOR:"UEFA",CRO:"UEFA",SCO:"UEFA",AUT:"UEFA",CZE:"UEFA",TUR:"UEFA",BIH:"UEFA",
  MEX:"CONCACAF",USA:"CONCACAF",CAN:"CONCACAF",PAN:"CONCACAF",HAI:"CONCACAF",CUW:"CONCACAF",
  MAR:"CAF",SEN:"CAF",GHA:"CAF",RSA:"CAF",EGY:"CAF",CIV:"CAF",COD:"CAF",TUN:"CAF",
  JPN:"AFC",KOR:"AFC",SAU:"AFC",IRN:"AFC",AUS:"AFC",QAT:"AFC",JOR:"AFC",UZB:"AFC",IRQ:"AFC",
  NZL:"OFC",CPV:"CAF",ALG:"CAF"
};

Object.entries(WC2026.groups).forEach(([gKey,g])=>{
  g.teams.forEach(t=>{
    allTeams.push({...t, group:gKey, confederation: confMap[t.id]||'Other'});
  });
});

let currentConf = 'ALL';
let searchQuery = '';

function filterConf(conf, btn) {
  currentConf = conf;
  document.querySelectorAll('#conf-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderTeams();
}

document.getElementById('team-search').addEventListener('input', e=>{
  searchQuery = e.target.value.toLowerCase();
  renderTeams();
});

function renderTeams() {
  const grid = document.getElementById('teams-grid');
  let filtered = allTeams;
  if(currentConf!=='ALL') filtered = filtered.filter(t=>t.confederation===currentConf);
  if(searchQuery) filtered = filtered.filter(t=>t.name.toLowerCase().includes(searchQuery)||t.confederation.toLowerCase().includes(searchQuery));

  grid.innerHTML = '';
  filtered.forEach(t=>{
    const hasDetail = !!WC2026.teams[t.id];
    grid.innerHTML += `
    <div class="stat-card" id="${t.id}" style="cursor:${hasDetail?'pointer':'default'};"
      onclick="${hasDetail?`showTeam('${t.id}')`:''}" title="${hasDetail?'Click for squad & details':''}">
      <div style="font-size:2.5rem;line-height:1.2;">${t.flag}</div>
      <div style="font-weight:700;margin:.4rem 0 .2rem;font-size:.9rem;">${t.name}</div>
      <div class="badge badge-group">Group ${t.group}</div>
      ${t.host?'<div class="badge badge-host" style="margin-left:.3rem;">HOST</div>':''}
      <div style="font-size:.72rem;color:var(--text-muted);margin-top:.4rem;">${t.confederation||''}</div>
      ${hasDetail?'<div style="font-size:.7rem;color:var(--green-light);margin-top:.3rem;">📋 View Squad</div>':''}
    </div>`;
  });
  if(filtered.length===0) grid.innerHTML='<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:2rem;">No teams found.</p>';
}

function showTeam(id) {
  const t = WC2026.teams[id];
  const gt = getTeamById(id);
  if(!t) return;
  document.getElementById('team-detail').style.display='block';
  document.getElementById('team-detail').scrollIntoView({behavior:'smooth'});

  let squadHtml = '';
  ['GK','DEF','MID','FWD'].forEach(pos=>{
    const players = t.squad.filter(p=>p.pos===pos);
    if(!players.length) return;
    const posNames = {GK:'Goalkeepers',DEF:'Defenders',MID:'Midfielders',FWD:'Forwards'};
    squadHtml += `<div style="margin-bottom:1rem;"><div style="font-size:.8rem;font-weight:700;color:var(--text-muted);letter-spacing:.05em;margin-bottom:.5rem;">${posNames[pos]}</div>`;
    squadHtml += '<div class="player-grid">';
    players.forEach(p=>{
      squadHtml += `<div class="player-card">
        <div class="player-name">${p.name}</div>
        <span class="player-pos pos-${p.pos}">${p.pos}</span>
        <div class="player-club">🏟️ ${p.club}</div>
        <div class="player-club">Caps: ${p.caps} &nbsp;|&nbsp; Age: ${p.age}</div>
      </div>`;
    });
    squadHtml += '</div></div>';
  });

  const triviaHtml = t.trivia.map(tr=>`<div class="record-item"><div class="record-icon">⚽</div><div>${tr}</div></div>`).join('');

  const gd = gt ? gt.gf - gt.ga : 0;

  document.getElementById('team-detail').innerHTML = `
  <div class="card">
    <div class="team-hero">
      <div class="team-flag-big">${t.flag}</div>
      <div class="team-info">
        <h2>${t.name}</h2>
        <p>Coach: <strong>${t.coach.name}</strong> (${t.coach.nationality})</p>
        <p>World Cup Titles: <strong style="color:var(--gold);">${t.worldCupTitles}${t.lastTitle?' (last: '+t.lastTitle+')':' (yet to win)'}</strong></p>
        ${gt?`<p>Group ${gt.group||''}: <strong>${gt.pts} pts &nbsp;|&nbsp; ${gt.won}W ${gt.drawn}D ${gt.lost}L &nbsp;|&nbsp; GD ${gd>0?'+'+gd:gd}</strong></p>`:''}
      </div>
    </div>
    <div class="card-title">📋 Squad</div>
    ${squadHtml}
    <div class="card-title" style="margin-top:1rem;">💡 Team Trivia</div>
    ${triviaHtml}
    <button onclick="document.getElementById('team-detail').style.display='none'"
      style="margin-top:1rem;padding:.5rem 1.5rem;background:var(--green-mid);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:.88rem;">
      ✕ Close
    </button>
  </div>`;
}

renderTeams();

// Check for hash to auto-open
if(location.hash) {
  const id = location.hash.slice(1);
  setTimeout(()=>{
    const el = document.getElementById(id);
    if(el){el.scrollIntoView({behavior:'smooth'});}
    if(WC2026.teams[id]) showTeam(id);
  },300);
}
</script>
</body>
</html>
