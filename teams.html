<script>
function gc(id){ return WC2026.countries[id]||{name:id,flag:'🏳️',confederation:'',continent:'',capital:'',area:'',population:'',landmark:'',landmarkDesc:''}; }
function sortTeams(ts){ return [...ts].sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF); }

const allGroups = Object.keys(WC2026.groups);

// Build tabs: "All" + each group
const tabsEl = document.getElementById('group-tabs');
const allBtn = document.createElement('button');
allBtn.className = 'tab-btn active';
allBtn.textContent = 'All Groups';
allBtn.onclick = ()=>showAll(allBtn);
tabsEl.appendChild(allBtn);

allGroups.forEach(g=>{
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.textContent = 'Group '+g;
  btn.onclick = ()=>showGroup(g, btn);
  tabsEl.appendChild(btn);
});

showAll(allBtn);

function setActiveTab(btn) {
  document.querySelectorAll('#group-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function showAll(btn) {
  setActiveTab(btn);
  let html = '';
  allGroups.forEach(g=>{ html += buildGroupSection(g); });
  document.getElementById('teams-content').innerHTML = html;
}

function showGroup(g, btn) {
  setActiveTab(btn);
  document.getElementById('teams-content').innerHTML = buildGroupSection(g);
}

function buildGroupSection(g) {
  const grp = WC2026.groups[g];
  const sorted = sortTeams(grp.teams);
  let cards = '';
  sorted.forEach(t=>{
    const c = gc(t.id);
    cards += `<div class="team-card" id="card-${g}-${t.id}" onclick="toggleCountry('${g}','${t.id}')">
      <div class="team-code" style="font-weight:800;font-size:1.6rem;letter-spacing:.06em;margin-bottom:.3rem;">${t.id}</div>
      <div class="team-name">${c.name}</div>
      <div style="font-size:.68rem;color:var(--text-muted);margin:.15rem 0 .1rem;">FIFA Rank: <strong>${c.fifaRank||'—'}</strong></div>
      <div class="team-pts">${t.Pts} pts · ${t.W}W ${t.D}D ${t.L}L</div>
    </div>`;
  });

  // Detail panels (one per team, spans full row)
  let details = '';
  sorted.forEach(t=>{
    const c = gc(t.id);
    details += `<div class="country-detail-row" id="detail-${g}-${t.id}">${buildCountryDetail(t.id, g, t)}</div>`;
  });

  return `<div class="card group-section">
    <div class="card-title">Group ${g}
      <span style="font-size:.75rem;font-weight:400;color:var(--text-muted);margin-left:.5rem;">
        ${sorted.map(t=>t.id).join('  ·  ')}
      </span>
    </div>
    <div class="group-teams-grid" id="grid-${g}">
      ${cards}
      ${details}
    </div>
  </div>`;
}

function buildCountryDetail(id, g, standing) {
  const c = gc(id);
  const squad = getSquad(id);
  const positions = ['GK','DEF','MID','FWD'];
  let squadHtml = '';
  if (squad.length) {
    positions.forEach(pos=>{
      const players = squad.filter(p=>p.pos===pos);
      if (!players.length) return;
      const posLabel = pos==='GK'?'Goalkeepers':pos==='DEF'?'Defenders':pos==='MID'?'Midfielders':'Forwards';
      squadHtml += `<div class="position-group">
        <div class="position-label">${posLabel}</div>`;
      players.forEach(p=>{
        squadHtml += `<div class="player-row">
          <div class="player-num">${p.no||'-'}</div>
          <div class="player-name-cell">${p.name}</div>
          <div class="player-club">${p.club||''}</div>
        </div>`;
      });
      squadHtml += '</div>';
    });
  } else {
    squadHtml = `<p style="color:var(--text-muted);font-size:.82rem;">Full squad details being updated. Check back after daily refresh at 12:30 PM IST.</p>`;
  }

  const gdText = standing.GD >= 0 ? '+'+standing.GD : standing.GD;

  return `<div class="team-detail-panel open" style="margin:0;">
    <div style="display:flex;align-items:flex-start;gap:1rem;flex-wrap:wrap;">
      <!-- Country info -->
      <div style="flex:1;min-width:220px;">
        <div style="font-size:1.1rem;font-weight:700;margin-bottom:.75rem;">${c.name} <span style="font-size:.8rem;font-weight:800;color:var(--accent);border:1px solid var(--accent);padding:.1rem .4rem;border-radius:4px;margin-left:.3rem;">${id}</span>${c.fifaRank?` <span style="font-size:.72rem;font-weight:400;color:var(--text-muted);margin-left:.4rem;">FIFA Rank #${c.fifaRank}</span>`:''}</div>
        <dl class="country-info-grid">
          <dt>Continent</dt><dd>${c.continent||'—'}</dd>
          <dt>FIFA Confederation</dt><dd>${c.confederation||'—'}</dd>
          <dt>Capital City</dt><dd>${c.capital||'—'}</dd>
          <dt>Area</dt><dd>${c.area||'—'}</dd>
          <dt>Population</dt><dd>${c.population||'—'}</dd>
          <dt>WC 2026 Group</dt><dd>Group ${g} · ${standing.Pts} pts (${standing.P} played)</dd>
          <dt>Goal Difference</dt><dd>${gdText}</dd>
        </dl>
      </div>
    </div>
    <!-- Players -->
    <button class="btn-players" onclick="togglePlayers('players-${g}-${id}', this)">👥 View Squad — ${c.name}</button>
    <div class="players-section hidden" id="players-${g}-${id}">
      ${squadHtml}
    </div>
  </div>`;
}

function toggleCountry(g, id) {
  const detail = document.getElementById('detail-'+g+'-'+id);
  const card   = document.getElementById('card-'+g+'-'+id);
  if (!detail) return;
  const isOpen = detail.classList.contains('open');
  // Close all in this group first
  document.querySelectorAll(`#grid-${g} .country-detail-row`).forEach(el=>el.classList.remove('open'));
  document.querySelectorAll(`#grid-${g} .team-card`).forEach(el=>el.classList.remove('expanded'));
  if (!isOpen) {
    detail.classList.add('open');
    card.classList.add('expanded');
  }
}

function togglePlayers(panelId, btn) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  panel.classList.toggle('hidden');
  btn.textContent = panel.classList.contains('hidden')
    ? btn.textContent.replace('Hide','View')
    : btn.textContent.replace('View','Hide');
}
