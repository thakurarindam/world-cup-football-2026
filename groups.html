<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groups &amp; Schedules | WC Football 2026</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">🏆 WC Football 2026</a>
  <ul class="nav-links">
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="groups.html" class="active">📊 Groups &amp; Schedules</a></li>
    <li><a href="teams.html">🌍 Teams</a></li>
    <li><a href="argentina.html">Argentina</a></li>
    <li><a href="facts.html">⭐ Facts</a></li>
  </ul>
</nav>

<div class="page-hero">
  <div class="container">
    <h1>📊 Groups &amp; Schedules</h1>
    <p>All 12 groups · Standings · Fixtures · Results &amp; Goal events &nbsp;|&nbsp; All times in IST (UTC+5:30)</p>
  </div>
</div>

<div class="container">

  <!-- GROUP TABS -->
  <div class="card" style="padding:.75rem;">
    <div class="tabs" id="group-tabs" style="margin-bottom:0;"></div>
  </div>

  <!-- GROUP CONTENT -->
  <div id="group-content"></div>

</div>

<footer>
  <strong>World Cup Football 2026</strong> — Argentina Fan Portal &nbsp;|&nbsp;
  <a href="https://www.fifa.com" target="_blank">Official FIFA Site</a>
</footer>

<script src="js/data.js?v=202607151900"></script>
<script>
const IST_TZ = 'Asia/Kolkata';
function fmtIST(u){ return new Date(u+'Z').toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:IST_TZ}).toUpperCase()+' IST'; }
function fmtDateTime(u){ const d=new Date(u+'Z'); return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric',timeZone:IST_TZ})+' · '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:IST_TZ}).toUpperCase()+' IST'; }
function gc(id){ return WC2026.countries[id]||{name:id,flag:'🏳️'}; }
function sortTeams(ts){ return [...ts].sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF); }

// Build group tabs, followed by a Knockout Stage tab
const tabs = document.getElementById('group-tabs');
const groups = Object.keys(WC2026.groups);
groups.forEach((g,i)=>{
  const btn = document.createElement('button');
  btn.className = 'tab-btn'+(i===0?' active':'');
  btn.textContent = 'Group '+g;
  btn.onclick=()=>showGroup(g,btn);
  tabs.appendChild(btn);
});
const koBtn = document.createElement('button');
koBtn.className = 'tab-btn';
koBtn.textContent = '🏆 Knockout Stage';
koBtn.onclick = ()=>showKnockoutStage(koBtn);
tabs.appendChild(koBtn);

showGroup('A', tabs.querySelector('.tab-btn'));

// ── KNOCKOUT STAGE ──────────────────────────────────────────────────
const IST_TZ2 = IST_TZ;
function fmtDateTimeKO(u){ return fmtDateTime(u); }

const KO_ROUNDS = [
  { key:'r32',        label:'Round of 32' },
  { key:'r16',        label:'Round of 16' },
  { key:'qf',         label:'Quarter-Finals' },
  { key:'sf',         label:'Semi-Finals' },
  { key:'thirdPlace', label:'Match for Third Place' },
  { key:'final',      label:'Final' }
];

function showKnockoutStage(btn) {
  document.querySelectorAll('#group-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  let html = `<div class="card" style="padding:.75rem;">
    <div class="tabs" id="knockout-subtabs" style="margin-bottom:0;"></div>
  </div>
  <div id="knockout-content"></div>`;
  document.getElementById('group-content').innerHTML = html;

  const subtabs = document.getElementById('knockout-subtabs');
  KO_ROUNDS.forEach((r,i)=>{
    const b = document.createElement('button');
    b.className = 'tab-btn'+(i===0?' active':'');
    b.textContent = r.label;
    b.onclick = ()=>showKnockoutRound(r.key, r.label, b);
    subtabs.appendChild(b);
  });
  showKnockoutRound(KO_ROUNDS[0].key, KO_ROUNDS[0].label, subtabs.querySelector('.tab-btn'));
}

function showKnockoutRound(roundKey, roundLabel, btn) {
  document.querySelectorAll('#knockout-subtabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  const matches = ((WC2026.knockout||{})[roundKey] || []).slice().sort((a,b)=>new Date(a.utc)-new Date(b.utc));
  let html = `<div class="card"><div class="card-title">🏆 ${roundLabel}
    <span style="font-size:.72rem;font-weight:400;color:var(--text-muted);">(click a match to see goal events)</span></div>`;

  if (!matches.length) {
    html += `<p style="color:var(--text-muted);font-size:.85rem;">No fixtures available for this round yet.</p>`;
  } else {
    matches.forEach(f=>{ html += buildKnockoutCard(f); });
  }
  html += '</div>';
  document.getElementById('knockout-content').innerHTML = html;
}

function buildKnockoutCard(f) {
  const hc = f.home ? gc(f.home) : null;
  const ac = f.away ? gc(f.away) : null;
  const homeLabel = hc ? `${hc.name} <span class="team-code">${f.home}</span>` : `<span style="color:var(--text-muted);font-style:italic;">${f.homeSrc||'TBD'}</span>`;
  const awayLabel = ac ? `<span class="team-code">${f.away}</span> ${ac.name}` : `<span style="color:var(--text-muted);font-style:italic;">${f.awaySrc||'TBD'}</span>`;

  const scorePart = f.status==='FT'
    ? `<div class="match-score">${f.score.h}–${f.score.a}</div>`
    : `<div class="match-score upcoming">${fmtIST(f.utc)}</div>`;
  const badge = f.status==='FT'
    ? `<span class="badge badge-done">FT</span>`
    : `<span class="badge badge-upcoming">Upcoming</span>`;

  let detail = '<div style="padding-top:.6rem;">';
  if (f.status==='FT') {
    if (f.events && f.events.length > 0) {
      detail += '<div style="font-size:.72rem;font-weight:700;color:var(--accent);margin-bottom:.35rem;">⚽ Goal Events</div>';
      f.events.forEach(e=>{
        detail += `<div class="goal-event"><span class="goal-minute">${e.min}'</span><span class="team-code">${e.team}</span><span>${e.player}</span></div>`;
      });
    } else {
      detail += '<p style="font-size:.8rem;color:var(--text-muted);">No goal events recorded.</p>';
    }
  } else {
    detail += `<p style="font-size:.82rem;color:var(--text-muted);">Match not yet played · ${fmtDateTimeKO(f.utc)}</p>`;
  }
  detail += '</div>';

  return `<div class="match-card" onclick="this.querySelector('.match-detail-panel').classList.toggle('open')">
    <div class="match-header">
      ${badge}
      <span>${fmtDateTimeKO(f.utc)}</span>
      <span class="click-hint">👆 click for events</span>
    </div>
    <div class="match-teams">
      <div class="match-team">${homeLabel}</div>
      ${scorePart}
      <div class="match-team right">${awayLabel}</div>
    </div>
    ${f.note ? `<div style="font-size:.72rem;color:var(--accent);margin-top:.2rem;">${f.note}</div>` : ''}
    <div class="match-venue">📍 ${f.venue}</div>
    <div class="match-detail-panel">${detail}</div>
  </div>`;
}

function showGroup(gKey, btn) {
  document.querySelectorAll('#group-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const grp = WC2026.groups[gKey];
  const sorted = sortTeams(grp.teams);
  const fixtures = WC2026.fixtures.filter(f=>f.group===gKey).sort((a,b)=>new Date(a.utc)-new Date(b.utc));

  // Standings table
  let standings = `<div class="card">
    <div class="card-title">📋 ${grp.name} Standings</div>
    <table class="standings-table">
      <thead><tr>
        <th style="text-align:left;">Team</th>
        <th>P</th><th>W</th><th>D</th><th>L</th>
        <th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
      </tr></thead><tbody>`;
  sorted.forEach((t,i)=>{
    const c=gc(t.id);
    const gdCls = t.GD>0?'gd-pos':t.GD<0?'gd-neg':'';
    standings += `<tr class="${i<2?'qualified':''}">
      <td>${c.name} <span class="team-code">${t.id}</span></td>
      <td>${t.P}</td><td>${t.W}</td><td>${t.D}</td><td>${t.L}</td>
      <td>${t.GF}</td><td>${t.GA}</td>
      <td class="${gdCls}">${t.GD>=0?'+':''}${t.GD}</td>
      <td class="pts">${t.Pts}</td>
    </tr>`;
  });
  standings += `</tbody></table>
    <div style="font-size:.75rem;color:var(--text-muted);margin-top:.75rem;">
      🟦 Highlighted rows = qualified / on track for Round of 32
    </div>
  </div>`;

  // Group fixtures with clickable detail
  let fixtureHtml = `<div class="card"><div class="card-title">📅 All Fixtures &amp; Results — Group ${gKey} <span style="font-size:.72rem;font-weight:400;color:var(--text-muted);">(click a match to see goal events)</span></div>`;

  // Group by matchday label
  const md = {};
  fixtures.forEach(f=>{
    const mdIdx = grp.teams[0] ? Math.ceil((WC2026.fixtures.filter(x=>x.group===gKey&&new Date(x.utc)<=new Date(f.utc)).length) / 2) : 1;
    if(!md[mdIdx]) md[mdIdx]=[];
    md[mdIdx].push(f);
  });

  let mdNum = 1;
  const fixturesByMd = {};
  fixtures.forEach(f=>{
    // group by pairs of matches (2 per matchday)
    const key = Math.ceil((fixtures.indexOf(f)+1)/2);
    if(!fixturesByMd[key]) fixturesByMd[key]=[];
    fixturesByMd[key].push(f);
  });

  Object.keys(fixturesByMd).forEach(mdKey=>{
    fixtureHtml += `<div style="font-size:.75rem;font-weight:700;color:var(--accent);margin:.75rem 0 .4rem;">— Matchday ${mdKey} —</div>`;
    fixturesByMd[mdKey].forEach(f=>{
      fixtureHtml += buildFixtureCard(f, gKey);
    });
  });

  fixtureHtml += '</div>';

  document.getElementById('group-content').innerHTML = standings + fixtureHtml;
}

function buildFixtureCard(f, gKey) {
  const hc=gc(f.home), ac=gc(f.away);
  const scorePart = f.status==='FT'
    ? `<div class="match-score">${f.score.h}–${f.score.a}</div>`
    : `<div class="match-score upcoming">${fmtIST(f.utc)}</div>`;
  const badge = f.status==='FT'
    ? `<span class="badge badge-done">FT</span>`
    : `<span class="badge badge-upcoming">Upcoming</span>`;

  let detail = '';
  // Goal events
  if (f.status==='FT') {
    detail += '<div style="padding-top:.6rem;">';
    if (f.events && f.events.length > 0) {
      detail += '<div style="font-size:.72rem;font-weight:700;color:var(--accent);margin-bottom:.35rem;">⚽ Goal Events</div>';
      f.events.forEach(e=>{
        detail += `<div class="goal-event"><span class="goal-minute">${e.min}'</span><span class="team-code">${e.team}</span><span>${e.player}</span></div>`;
      });
    } else {
      detail += '<p style="font-size:.8rem;color:var(--text-muted);">No goal events recorded.</p>';
    }
    detail += '</div>';
  } else {
    detail += `<div style="padding-top:.6rem;font-size:.82rem;color:var(--text-muted);">Match not yet played · ${fmtDateTime(f.utc)}</div>`;
  }

  // Mini standings
  const grp = WC2026.groups[gKey];
  const sorted = sortTeams(grp.teams);
  detail += `<div class="standings-mini" style="margin-top:.75rem;">
    <div class="standings-mini-title">Group ${gKey} Standings</div>
    <table><thead><tr><th style="text-align:left;">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
  sorted.forEach((t,i)=>{
    const c=gc(t.id);
    detail+=`<tr class="${i<2?'q-row':''}"><td>${c.name} <span class="team-code">${t.id}</span></td><td>${t.P}</td><td>${t.W}</td><td>${t.D}</td><td>${t.L}</td><td>${t.GD>=0?'+':''}${t.GD}</td><td style="font-weight:700;color:var(--gold);">${t.Pts}</td></tr>`;
  });
  detail += `</tbody></table></div>`;

  return `<div class="match-card" onclick="this.querySelector('.match-detail-panel').classList.toggle('open')">
    <div class="match-header">
      ${badge}
      <span>${fmtDateTime(f.utc)}</span>
      <span class="click-hint">👆 click for events &amp; table</span>
    </div>
    <div class="match-teams">
      <div class="match-team">${hc.name} <span class="team-code">${f.home}</span></div>
      ${scorePart}
      <div class="match-team right"><span class="team-code">${f.away}</span> ${ac.name}</div>
    </div>
    <div class="match-venue">📍 ${f.venue}</div>
    <div class="match-detail-panel">${detail}</div>
  </div>`;
}
</script>
</body>
</html>
